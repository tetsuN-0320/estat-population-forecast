<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>都道府県詳細 — 日本の人口動態予測</title>
  <meta name="description" content="都道府県別の人口ピラミッドアニメーション（1990→2050年）と3モデル予測の時系列グラフ。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/css/main.css">
</head>
<body>

<header>
  <div class="header-title">
    日本の人口動態予測
    <span>Population Forecast Japan 1990–2050</span>
  </div>
  <nav>
    <a href="index.html">地図</a>
    <a href="about.html">プロジェクトについて</a>
  </nav>
</header>

<div class="page-container">

  <a href="index.html" class="back-link">← 地図に戻る</a>

  <div class="pref-header">
    <h1 id="pref-name">読み込み中…</h1>
    <span id="pref-change-badge"></span>
  </div>

  <!-- サマリーカード -->
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem"
       id="summary-cards"></div>

  <div class="detail-grid">

    <!-- ===== 人口ピラミッド ===== -->
    <div class="card">
      <div class="chart-title">
        人口ピラミッド
        <span class="chart-subtitle">（年齢5歳階級別・男女別）</span>
      </div>

      <!-- 年齢構成比バー -->
      <div id="age-composition" style="margin-bottom:.75rem"></div>

      <!-- 年ボタン -->
      <div class="pyramid-controls" id="pyramid-year-btns"></div>

      <!-- 再生ボタン -->
      <div id="pyramid-play-wrap"></div>

      <!-- ピラミッド SVG -->
      <svg id="pyramid-svg" width="100%" height="404" style="margin-top:.5rem"></svg>

      <!-- 凡例 -->
      <div class="pyramid-legend" style="margin-top:.5rem">
        <span><span class="legend-box" style="background:#2471a3"></span> 男性（生産年齢）</span>
        <span><span class="legend-box" style="background:#5dade2"></span> 男性（年少）</span>
        <span><span class="legend-box" style="background:#1a5276"></span> 男性（老年）</span>
      </div>
      <div class="pyramid-legend" style="margin-top:.25rem">
        <span><span class="legend-box" style="background:#c0392b"></span> 女性（生産年齢）</span>
        <span><span class="legend-box" style="background:#e59866"></span> 女性（年少）</span>
        <span><span class="legend-box" style="background:#922b21"></span> 女性（老年）</span>
      </div>
    </div>

    <!-- ===== 時系列グラフ ===== -->
    <div class="card">
      <div class="chart-title">
        総人口の推移と予測
        <span class="chart-subtitle">（万人）</span>
      </div>
      <div id="timeseries-chart-wrap" style="position:relative">
        <canvas id="timeseries-chart"></canvas>
      </div>
      <div style="margin-top:.6rem;font-size:.75rem;color:var(--color-muted);line-height:1.7">
        ※ 網掛け部分はコーホート法・Prophet・ARIMA の3モデル幅（予測の不確実性の目安）
      </div>
      <div class="model-legend" id="model-legend" style="margin-top:.75rem"></div>
    </div>

  </div><!-- /detail-grid -->

  <!-- 他の都道府県 -->
  <div style="margin-top:1.5rem" class="card">
    <div class="chart-title">他の都道府県を見る</div>
    <div id="pref-nav" style="display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem"></div>
  </div>

</div><!-- /page-container -->

<footer>
  <p>データ出典: 総務省統計局 e-Stat 国勢調査 / 国立社会保障・人口問題研究所（社人研）将来推計人口</p>
  <p style="margin-top:.3rem;">© 2024 <a href="about.html">中江 哲夫</a> — ポートフォリオ作品</p>
</footer>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<!-- D3.js（ピラミッド用） -->
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="static/js/prefecture.js"></script>

</body>
</html>
